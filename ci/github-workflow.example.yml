# Example CI wrapper — thin orchestration only; no repair logic lives here.
# It runs E2E tests, and on failure invokes the CLI core to self-heal, then
# opens a PR with the patch. Copy into .github/workflows/ and adjust as needed.

name: e2e-self-heal

on:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node + Playwright
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Install the healer (Python)
        run: |
          pipx install uv
          uv sync

      # Run E2E; capture the log. Do not fail the job yet — we may self-heal.
      - name: Run E2E tests
        id: e2e
        continue-on-error: true
        run: npx playwright test 2>&1 | tee playwright.log

      # Only when tests failed: hand the failing test + log + diff to the CLI core.
      - name: Self-heal failing test
        if: steps.e2e.outcome == 'failure'
        id: heal
        run: |
          uv run e2e-healer tests/example.spec.ts \
            --log playwright.log \
            --json > repair-summary.json
        continue-on-error: true

      # If the core fixed it (exit 0), open a PR with the patch.
      - name: Open patch PR
        if: steps.heal.outcome == 'success'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "fix(e2e): auto-heal broken selectors"
          title: "Auto-healed E2E test"
          body-path: repair-summary.json
          branch: e2e-self-heal/${{ github.run_id }}

      # If it could not be healed, fail the job so humans look.
      - name: Fail if unhealed
        if: steps.e2e.outcome == 'failure' && steps.heal.outcome != 'success'
        run: exit 1
