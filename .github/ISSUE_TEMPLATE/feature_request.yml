name: "💡 Feature request"
description: Suggest an idea or improvement
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! 💡 Framing the **problem** first (not just the solution)
        helps us design the right thing.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched [existing issues](https://github.com/Lee-Dongwook/E2E-Self-Heal/issues) and this isn't already requested.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: What's hard or impossible today?
      placeholder: When a test uses a role-based locator, the healer can't…
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? A rough sketch is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
    validations:
      required: false
  - type: dropdown
    id: contribute
    attributes:
      label: Would you be willing to help implement this?
      options:
        - "Yes, I'd like to work on it"
        - "Maybe, with some guidance"
        - "No, just suggesting"
    validations:
      required: false
